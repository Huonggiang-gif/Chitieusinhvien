<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense</title>
    <script src="User.js" defer></script>
    <link rel="stylesheet" href="User.css">
</head>
<body>
    <section class="expense-form">
        <a href="User.html" class="goBack">Dashboard</a>
        <h2>Quản lý chi tiêu</h2>
        <form id="addexpense">
            <select id="category">
                <option value="">Chọn danh mục</option>
                <option>Ăn uống</option>
                <option>Di chuyển</option>
                <option>Giải trí</option>
                <option>Khác</option>
            </select>
            <input type="number" id="amount" placeholder="Số tiền">
            
            <input type="date" id="date">

            <button type="submit">Thêm</button>
        </form>
    </section>
    <section class="expense-list">
        <h2>Danh sách chi tiêu</h2>
        <table>
            <thead>
                <tr>
                    <th>Danh mục</th>
                    <th>Số tiền</th>
                    <th>Ngày</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
        </table>
    </section>
</body>
</html>
